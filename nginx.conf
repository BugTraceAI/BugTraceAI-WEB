# WebSocket upgrade mapping (clean handling for mixed HTTP/WS locations)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS for lazy upstream resolution (prevents crash on missing services)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Load the default MIME types from the main Nginx configuration.
    include /etc/nginx/mime.types;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # API Routes MCP — SSE stream (GET /kr-mcp/sse)
    location /kr-mcp/sse {
        set $kr_host api-routes:8003;
        proxy_pass http://$kr_host/sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming: disable connection close and buffering
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # API Routes MCP — JSON-RPC POST messages
    location /kr-mcp/messages/ {
        set $kr_host api-routes:8003;
        proxy_pass http://$kr_host/messages/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API Routes REST — Kiterunner FastAPI (used by API Discovery frontend)
    location /kr-api/ {
        set $kr_host api-routes:8004;
        proxy_pass http://$kr_host/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # CLI API proxy (HTTP + WebSocket) — BugTraceAI-CLI FastAPI
    # Strips /cli-api/ prefix and forwards to CLI on host
    location /cli-api/ {
        proxy_pass http://host.docker.internal:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (scan event streams)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-running scan connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WEB Backend API proxy
    location /api/ {
        set $backend_host backend:3001;
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO proxy (WebSocket + polling)
    location /socket.io/ {
        set $backend_host backend:3001;
        proxy_pass http://$backend_host/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy for real-time updates
    location /ws/ {
        set $backend_host backend:3001;
        proxy_pass http://$backend_host/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files - React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent browser from caching index.html (JS/CSS have hashed names)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Documentation subdirectories
    location /devinfo/ {
        try_files $uri $uri/ =404;
    }

    location /userinfo/ {
        try_files $uri $uri/ =404;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Health check
    location /health {
        set $backend_host backend:3001;
        proxy_pass http://$backend_host/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health/detailed {
        set $backend_host backend:3001;
        proxy_pass http://$backend_host/health/detailed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
